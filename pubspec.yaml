name: velvet
description: "Velvet · Touch what was touched. 私藏，流转。"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^14.6.2

  # 网络
  dio: ^5.7.0

  # 存储
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # 图片
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0  # Pinterest masonry
  flutter_svg: ^2.0.16
  blur: ^4.0.0

  # 实时
  web_socket_channel: ^3.0.1

  # 地理定位（同城 / 附近）
  geolocator: ^13.0.2

  # 分享
  share_plus: ^10.1.2

  # Apple Sign-In · iOS 上架必须 · 后端 /api/v1/auth/apple 验签
  sign_in_with_apple: ^6.1.4

  # 运动传感器（陀螺仪 / 加速计 · splash 3D tilt）
  sensors_plus: ^6.1.0

  # 工具
  intl: ^0.20.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 推送 (TODO 后续接入 firebase — 临时移除避免 build 冲突)
  # firebase_core: ^3.8.0
  # firebase_messaging: ^15.1.5

  # 分析 (TODO)
  # sentry_flutter: ^8.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  generate: true   # 启用 flutter gen-l10n · 读取 lib/l10n/ ARB 文件
  assets:
    - assets/images/
    - assets/icons/
    # google_fonts 包通过 rootBundle.load('google_fonts/...') 读取本地字体
    # 必须在此注册 · 否则 rootBundle 找不到 → 字体不生效 → 全 fallback 系统默认
    - google_fonts/
